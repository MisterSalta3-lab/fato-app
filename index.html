<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday Salma ❤️</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ========================= -->
    <!-- Background -->
    <!-- ========================= -->

    <div id="stars"></div>
    <div id="particles"></div>
    <div id="aurora"></div>

    <!-- ========================= -->
    <!-- Intro Screen -->
    <!-- ========================= -->

    <section id="intro">

        <h1 class="introTitle">
            A Special Surprise
        </h1>

        <p class="introText">
            Someone has prepared something beautiful for you...
        </p>

        <button id="startBtn">

            ✨ Start Surprise ✨

        </button>

    </section>



    <!-- ========================= -->
    <!-- Celebration -->
    <!-- ========================= -->

    <section id="celebration">

        <div class="overlay"></div>

        <h1 id="birthdayTitle">

            Happy Birthday

        </h1>

        <h2 id="name">

            Salma ❤️

        </h2>



        <div id="typingMessage"></div>



        <div id="buttons">

            <button id="flowersBtn">

                🌹 Flowers

            </button>

            <button id="heartBtn">

                ❤️ Love

            </button>

            <button id="balloonBtn">

                🎈 Balloons

            </button>

            <button id="fireworksBtn">

                🎆 Fireworks

            </button>

            <button id="giftBtn">

                🎁 Open Gift

            </button>

        </div>



        <!-- Cake -->

        <div id="cakeSection">

            <div id="cake">

                🎂

            </div>

            <button id="blowBtn">

                Blow The Candles 💨

            </button>

        </div>



        <!-- Gift -->

        <div id="giftBox">

            🎁

        </div>



        <div id="giftMessage">

            You deserve every happiness in the world ❤️
        </div>

    </section>



    <!-- Floating Elements -->

    <div id="heartsContainer"></div>

    <div id="flowersContainer"></div>

    <div id="balloonsContainer"></div>

    <div id="confettiContainer"></div>

    <div id="fireworksContainer"></div>



    <!-- Music -->

    <audio id="bgMusic" loop>

        <source src="music.mp3" type="audio/mpeg">

    </audio>



    <script src="script.js"></script>

</body>

</html>
